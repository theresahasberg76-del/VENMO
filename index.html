<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Wallet Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .demo-badge {
            display: inline-block;
            background: #ff6b6b;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        .balance-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .balance-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .balance-amount {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 15px;
        }
        
        .input-section {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-send {
            background: #667eea;
            color: white;
        }
        
        .btn-send:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-withdraw {
            background: #764ba2;
            color: white;
        }
        
        .btn-withdraw:hover {
            background: #654291;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        }
        
        .btn-reset {
            background: #f0f0f0;
            color: #333;
            width: 100%;
        }
        
        .btn-reset:hover {
            background: #e0e0e0;
        }
        
        .transactions-section h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .transactions-list {
            max-height: 250px;
            overflow-y: auto;
        }
        
        .transaction-item {
            background: #f8f9fa;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #667eea;
        }
        
        .transaction-item.withdrawal {
            border-left-color: #764ba2;
        }
        
        .transaction-item.deposit {
            border-left-color: #51cf66;
        }
        
        .transaction-text {
            color: #555;
            font-size: 14px;
        }
        
        .transaction-amount {
            font-weight: bold;
            font-size: 14px;
        }
        
        .transaction-amount.sent {
            color: #764ba2;
        }
        
        .transaction-amount.received {
            color: #51cf66;
        }
        
        .empty-state {
            text-align: center;
            color: #999;
            padding: 20px;
            font-size: 14px;
        }
        
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            font-weight: 500;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="demo-badge">DEMO ONLY - NO REAL FUNDS</div>
            <h1>Training Demo Wallet</h1>
        </div>
        
        <div id="message" class="message"></div>
        
        <div class="balance-section">
            <div class="balance-label">Current Balance</div>
            <div class="balance-amount" id="balance">$5,000.00</div>
        </div>
        
        <div class="input-section">
            <label for="amount">Enter Amount:</label>
            <input 
                type="number" 
                id="amount" 
                placeholder="0.00" 
                min="0" 
                step="0.01"
            >
        </div>
        
        <div class="button-group">
            <button class="btn-send" onclick="sendFunds()">Send Funds</button>
            <button class="btn-withdraw" onclick="withdrawFunds()">Withdraw Funds</button>
        </div>
        
        <button class="btn-reset" onclick="resetBalance()">Reset Balance</button>
        
        <div class="transactions-section">
            <h3>Recent Transactions</h3>
            <div class="transactions-list" id="transactionsList">
                <div class="empty-state">No transactions yet. Make your first transaction!</div>
            </div>
        </div>
    </div>
    
    <script>
        const INITIAL_BALANCE = 5000.00;
        const STORAGE_KEY = 'walletBalance';
        const TRANSACTIONS_KEY = 'walletTransactions';
        
        // Initialize
        window.addEventListener('DOMContentLoaded', function() {
            loadBalance();
            loadTransactions();
        });
        
        function loadBalance() {
            const savedBalance = localStorage.getItem(STORAGE_KEY);
            if (savedBalance) {
                updateBalanceDisplay(parseFloat(savedBalance));
            } else {
                updateBalanceDisplay(INITIAL_BALANCE);
                saveBalance(INITIAL_BALANCE);
            }
        }
        
        function loadTransactions() {
            const saved = localStorage.getItem(TRANSACTIONS_KEY);
            const transactions = saved ? JSON.parse(saved) : [
                { type: 'deposit', amount: 1000, date: new Date().toLocaleDateString() },
                { type: 'withdrawal', amount: 500, date: new Date().toLocaleDateString() },
                { type: 'sent', amount: 250, date: new Date().toLocaleDateString() }
            ];
            displayTransactions(transactions);
        }
        
        function sendFunds() {
            const amount = parseFloat(document.getElementById('amount').value);
            
            if (!amount || amount <= 0) {
                showMessage('Please enter a valid amount', 'error');
                return;
            }
            
            const currentBalance = parseFloat(document.getElementById('balance').innerText.replace('$', ''));
            
            if (amount > currentBalance) {
                showMessage('Insufficient funds!', 'error');
                return;
            }
            
            const newBalance = currentBalance - amount;
            updateBalanceDisplay(newBalance);
            saveBalance(newBalance);
            addTransaction('sent', amount);
            
            showMessage(`Successfully sent $${amount.toFixed(2)}!`, 'success');
            document.getElementById('amount').value = '';
        }
        
        function withdrawFunds() {
            const amount = parseFloat(document.getElementById('amount').value);
            
            if (!amount || amount <= 0) {
                showMessage('Please enter a valid amount', 'error');
                return;
            }
            
            const currentBalance = parseFloat(document.getElementById('balance').innerText.replace('$', ''));
            
            if (amount > currentBalance) {
                showMessage('Insufficient funds!', 'error');
                return;
            }
            
            const newBalance = currentBalance - amount;
            updateBalanceDisplay(newBalance);
            saveBalance(newBalance);
            addTransaction('withdrawal', amount);
            
            showMessage(`Successfully withdrew $${amount.toFixed(2)}!`, 'success');
            document.getElementById('amount').value = '';
        }
        
        function resetBalance() {
            updateBalanceDisplay(INITIAL_BALANCE);
            saveBalance(INITIAL_BALANCE);
            localStorage.removeItem(TRANSACTIONS_KEY);
            loadTransactions();
            showMessage('Balance reset to $5,000.00', 'success');
        }
        
        function updateBalanceDisplay(balance) {
            document.getElementById('balance').innerText = '$' + balance.toFixed(2);
        }
        
        function saveBalance(balance) {
            localStorage.setItem(STORAGE_KEY, balance.toString());
        }
        
        function addTransaction(type, amount) {
            const saved = localStorage.getItem(TRANSACTIONS_KEY);
            const transactions = saved ? JSON.parse(saved) : [];
            
            transactions.unshift({
                type: type,
                amount: amount,
                date: new Date().toLocaleDateString()
            });
            
            localStorage.setItem(TRANSACTIONS_KEY, JSON.stringify(transactions));
            displayTransactions(transactions);
        }
        
        function displayTransactions(transactions) {
            const list = document.getElementById('transactionsList');
            
            if (transactions.length === 0) {
                list.innerHTML = '<div class="empty-state">No transactions yet. Make your first transaction!</div>';
                return;
            }
            
            list.innerHTML = transactions.map(tx => {
                const typeLabel = tx.type === 'sent' ? 'Payment Sent' : 
                                tx.type === 'withdrawal' ? 'Withdrawal' : 'Deposit';
                const amountClass = tx.type === 'received' ? 'received' : 
                                   tx.type === 'deposit' ? 'received' : 'sent';
                
                return `
                    <div class="transaction-item ${tx.type}">
                        <span class="transaction-text">
                            ${typeLabel} - ${tx.date}
                        </span>
                        <span class="transaction-amount ${amountClass}">
                            ${tx.type === 'deposit' ? '+' : '-'}$${tx.amount.toFixed(2)}
                        </span>
                    </div>
                `;
            }).join('');
        }
        
        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message ${type}`;
            
            setTimeout(() => {
                messageEl.className = 'message';
            }, 3000);
        }
    </script>
</body>
</html>
